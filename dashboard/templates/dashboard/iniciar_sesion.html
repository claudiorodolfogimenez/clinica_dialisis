<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - Puesto {{ puesto.numero }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            color: #1f2937;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            color: #0f4c81;
        }

        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .acciones {
            margin-top: 24px;
            display: flex;
            gap: 10px;
        }

        .btn {
            text-decoration: none;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-primario {
            background: #0f4c81;
            color: white;
        }

        .btn-secundario {
            background: #6b7280;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Iniciar sesión — Puesto {{ puesto.numero }}</h1>

        <form method="post">
            {% csrf_token %}

            <label for="paciente">Paciente</label>
            <select name="paciente" id="paciente" required>
                {% for p in pacientes %}
                    <option value="{{ p.id }}">{{ p }}</option>
                {% endfor %}
            </select>

            <label for="turno">Turno</label>
            <select name="turno" id="turno">
                <option value="manana">Mañana</option>
                <option value="tarde">Tarde</option>
                <option value="noche">Noche</option>
            </select>

            <div class="acciones">
                <button type="submit" class="btn btn-primario">Iniciar sesión</button>
                <a href="/sala/" class="btn btn-secundario">Volver</a>
            </div>
        </form>
    </div>
</body>
</html>
