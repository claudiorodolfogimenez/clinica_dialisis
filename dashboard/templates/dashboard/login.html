<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso al sistema</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            color: #0f4c81;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 18px;
            background: #0f4c81;
            color: white;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .errorlist, .error {
            color: #b91c1c;
            font-size: 14px;
            margin-top: 10px;
        }

        .help {
            text-align: center;
            margin-top: 12px;
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Ingreso al sistema</h1>

        {% if form.errors %}
            <div class="error">Usuario o contraseña incorrectos.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label for="id_username">Usuario</label>
            {{ form.username }}

            <label for="id_password">Contraseña</label>
            {{ form.password }}

            <button type="submit">Ingresar</button>
        </form>

        <div class="help">
            Clínica de Diálisis
        </div>
    </div>
</body>
</html>
