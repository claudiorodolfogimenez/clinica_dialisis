<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Finalizar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            color: #1f2937;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 24px;
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            color: #0f4c81;
        }

        .dato {
            margin-bottom: 8px;
        }

        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .acciones {
            margin-top: 22px;
            display: flex;
            gap: 10px;
        }

        .btn {
            text-decoration: none;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-primario {
            background: #0f4c81;
            color: white;
        }

        .btn-secundario {
            background: #6b7280;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Finalizar sesión</h1>

        <div class="dato"><strong>Paciente:</strong> {{ sesion.paciente }}</div>
        <div class="dato"><strong>Puesto:</strong> {{ sesion.puesto }}</div>
        <div class="dato"><strong>Fecha:</strong> {{ sesion.fecha }}</div>
        <div class="dato"><strong>Turno:</strong> {{ sesion.get_turno_display }}</div>
        <div class="dato"><strong>TA inicial:</strong> {{ sesion.ta_inicial|default:"-" }}</div>
        <div class="dato"><strong>Peso pre:</strong> {{ sesion.peso_pre|default:"-" }}</div>

        <form method="post">
            {% csrf_token %}

            <label for="ta_final">TA final</label>
            <input type="text" name="ta_final" id="ta_final" placeholder="Ej: 100/60">

            <label for="peso_post">Peso post</label>
            <input type="number" step="0.01" name="peso_post" id="peso_post" placeholder="Ej: 76.80">

            <label for="observaciones">Observaciones</label>
            <textarea name="observaciones" id="observaciones" placeholder="Observaciones de la sesión"></textarea>

            <div class="acciones">
                <button type="submit" class="btn btn-primario">Guardar y finalizar</button>
                <a href="/sala/?turno={{ sesion.turno }}" class="btn btn-secundario">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
